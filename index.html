<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALCONS - موسوعة الصقور</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #050505;
            --card: #121212;
            --saudi-green: #006C35;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* شاشة اختيار اللغة والبداية */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .lang-btns { margin-bottom: 20px; }
        
        .start-btn, .lang-btn {
            background: transparent;
            border: 2px solid var(--neon);
            color: var(--neon);
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            margin: 10px;
            font-weight: bold;
        }

        .start-btn:hover, .lang-btn.active {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        /* تنسيق عبارة صنع في السعودية */
        .made-in-saudi {
            margin-top: 30px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .saudi-flag {
            width: 40px;
            height: 25px;
            background-color: var(--saudi-green);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hidden { display: none !important; }

        /* واجهة المربعات */
        .container { padding: 20px; }
        h1 { text-align: center; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 20px auto;
        }

        .plane-square {
            background: var(--card);
            aspect-ratio: 1 / 1;
            border: 1px solid #333;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .plane-square:hover { border-color: var(--neon); transform: scale(1.05); }
        .plane-square img { width: 100%; height: 100%; object-fit: cover; }

        .plane-info-overlay {
            position: absolute;
            bottom: 0;
            background: linear-gradient(transparent, black);
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        /* واجهة التفاصيل */
        #details-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 500;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .specs-sheet {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--neon);
            max-width: 600px;
            margin-top: 20px;
        }

        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="welcome-text">مرحباً بك في موسوعة الصقور</h1>
        <div class="lang-btns">
            <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>
        <button class="start-btn" id="btn-start" onclick="goMain()">ابدأ / START</button>
        
        <div class="made-in-saudi">
            <div class="saudi-flag">🇸🇦</div>
            <span>MADE IN SAUDI</span>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="container">
            <h1 id="main-title">رادار الصقور 🦅</h1>
            <div class="grid-container" id="planes-grid"></div>
        </div>
    </div>

    <div id="details-view" class="hidden">
        <button class="start-btn" onclick="closeDetails()" style="padding: 10px 20px;">⬅️ عودة / BACK</button>
        <h1 id="det-name"></h1>
        <div id="variants-list"></div>
        <div id="specs-box" class="hidden">
            <div class="specs-sheet">
                <h3 id="v-title" style="color: var(--neon);"></h3>
                <div class="stat-row"><span id="lbl-speed">السرعة:</span> <span id="val-speed"></span></div>
                <div class="stat-row"><span id="lbl-payload">الحمولة:</span> <span id="val-payload"></span></div>
                <div class="stat-row"><span id="lbl-saudi">في السعودية:</span> <span id="val-saudi"></span></div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ar';

        // قاعدة البيانات (يمكنك إضافة المزيد هنا)
        const data = {
            "F-15SA Eagle": {
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/F-15SA_Saudi_Arabia_Air_Force.jpg/800px-F-15SA_Saudi_Arabia_Air_Force.jpg",
                ar: { speed: "3,017 كم/س", payload: "12 صاروخ", saudi: "84 طائرة" },
                en: { speed: "3,017 km/h", payload: "12 Missiles", saudi: "84 Aircraft" }
            },
            "Typhoon": {
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Eurofighter_Typhoon_FGR4_at_RIAT_2016_mod_2.jpg/800px-Eurofighter_Typhoon_FGR4_at_RIAT_2016_mod_2.jpg",
                ar: { speed: "2,495 كم/س", payload: "صواريخ ميتيور", saudi: "72 طائرة" },
                en: { speed: "2,495 km/h", payload: "Meteor Missiles", saudi: "72 Aircraft" }
            },
            "Boeing 747": {
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Saudi_Arabian_Boeing_747-400_Felici.jpg/800px-Saudi_Arabian_Boeing_747-400_Felici.jpg",
                ar: { speed: "988 كم/س", payload: "467 راكب", saudi: "متوفرة" },
                en: { speed: "988 km/h", payload: "467 Passengers", saudi: "Available" }
            }
        };

        function setLang(l) {
            currentLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('welcome-text').innerText = l === 'ar' ? 'مرحباً بك في موسوعة الصقور' : 'Welcome to Falcons Encyclopedia';
        }

        function goMain() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            buildGrid();
        }

        function buildGrid() {
            const grid = document.getElementById('planes-grid');
            grid.innerHTML = '';
            for (let p in data) {
                const div = document.createElement('div');
                div.className = 'plane-square';
                div.onclick = () => showDetails(p);
                div.innerHTML = `<img src="${data[p].img}"><div class="plane-info-overlay"><h2>${p}</h2></div>`;
                grid.appendChild(div);
            }
        }

        function showDetails(p) {
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('details-view').classList.remove('hidden');
            document.getElementById('det-name').innerText = p;
            
            const vList = document.getElementById('variants-list');
            vList.innerHTML = `<button class="variant-btn" onclick="showSpecs('${p}')">${currentLang === 'ar' ? 'النسخة الأساسية' : 'Main Model'}</button>`;
        }

        function showSpecs(p) {
            const d = data[p][currentLang];
            document.getElementById('specs-box').classList.remove('hidden');
            document.getElementById('val-speed').innerText = d.speed;
            document.getElementById('val-payload').innerText = d.payload;
            document.getElementById('val-saudi').innerText = d.saudi;
            
            // تحديث العناوين حسب اللغة
            document.getElementById('lbl-speed').innerText = currentLang === 'ar' ? 'السرعة:' : 'Speed:';
            document.getElementById('lbl-payload').innerText = currentLang === 'ar' ? 'الحمولة:' : 'Payload:';
            document.getElementById('lbl-saudi').innerText = currentLang === 'ar' ? 'في السعودية:' : 'In Saudi:';
        }

        function closeDetails() {
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('specs-box').classList.add('hidden');
        }
    </script>
</body>
</html>
