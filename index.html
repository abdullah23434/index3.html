<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALCONS MEGA DATA</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; transition: 0.3s; }
        
        /* شاشة البداية واللغة */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lang-select { display: flex; gap: 15px; margin-bottom: 30px; }
        .lang-btn { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 10px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .lang-btn.active { background: var(--neon); color: #000; }
        .start-btn { background: var(--neon); color: black; border: none; padding: 20px 80px; font-size: 2rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .ms { margin-top: 20px; color: #444; letter-spacing: 5px; font-weight: bold; }

        /* الشبكة: سطر فيه 2 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 40px auto; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

        /* الشريحة (المربع) */
        .plane-item { background: var(--card); border: 1px solid #222; cursor: pointer; transition: 0.3s; position: relative; }
        .plane-item:hover { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); }
        
        /* الاسم الكبير */
        .plane-header { padding: 50px 20px; text-align: center; }
        .plane-header h2 { font-size: 3.5rem; margin: 0; color: var(--neon); text-transform: uppercase; }

        /* منطقة المعلومات المخفية */
        .plane-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; background: #111; padding: 0 30px; }
        .plane-item.active .plane-content { max-height: 2000px; padding: 40px 30px; border-top: 2px solid var(--neon); }

        .deep-text { font-size: 1rem; line-height: 1.8; color: #aaa; text-align: justify; }
        .deep-text b { color: var(--neon); display: block; margin-top: 15px; font-size: 1.2rem; }

        .saudi-tag { background: #006C35; color: white; padding: 5px 15px; display: inline-block; margin-top: 20px; font-weight: bold; }
        .hidden { display: none !important; }
        .ltr { direction: ltr; text-align: left; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body class="rtl">

    <div id="start-screen">
        <h1 id="welcome-title" style="color:var(--neon); font-size: 3rem;">FALCONS DATA</h1>
        <div class="lang-select">
            <button class="lang-btn active" onclick="setLanguage('ar')">العربية</button>
            <button class="lang-btn" onclick="setLanguage('en')">ENGLISH</button>
        </div>
        <button class="start-btn" onclick="launch()">ابدأ / START</button>
        <div class="ms">MADE IN SAUDI</div>
    </div>

    <h1 id="main-title" style="text-align:center; font-size:3rem; color:var(--neon);">موسوعة 1000 طائرة</h1>
    <div class="grid" id="main-grid"></div>

    <script>
        let currentLang = 'ar';
        
        // عينة من 20 طائرة فريدة (سيقوم الكود بتوليد الـ 1000 منها ببيانات متغيرة)
        const planeNames = [
            "F-15SA", "Typhoon", "Tornado", "F-16", "F-22", "F-35", "Su-57", "Rafale", 
            "B-2 Spirit", "C-130", "Boeing 747", "Airbus A380", "A400M", "Apache AH-64", 
            "Black Hawk", "MiG-29", "Su-35", "F-14", "Mirage 2000", "Global Eye"
        ];

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.body.className = (lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('main-title').innerText = (lang === 'ar' ? 'موسوعة 1000 طائرة' : '1000 AIRCRAFT DATA');
        }

        function launch() {
            document.getElementById('start-screen').classList.add('hidden');
            renderPlanes();
        }

        function renderPlanes() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 1000; i++) {
                const nameIndex = (i - 1) % planeNames.length;
                const pName = planeNames[nameIndex] + " #" + i; // رقم فريد لكل طائرة
                
                const card = document.createElement('div');
                card.className = 'plane-item';
                card.onclick = function() { this.classList.toggle('active'); };

                const content = (currentLang === 'ar') ? generateArData(pName) : generateEnData(pName);

                card.innerHTML = `
                    <div class="plane-header">
                        <h2>${pName}</h2>
                        <small>${currentLang === 'ar' ? 'اضغط لعرض التفاصيل' : 'Click for details'}</small>
                    </div>
                    <div class="plane-content">
                        <div class="deep-text">${content}</div>
                        <div class="saudi-tag">🇸🇦 ${currentLang === 'ar' ? 'موجودة في السعودية' : 'Available in Saudi Arabia'}</div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function generateArData(name) {
            let text = `<b>معلومات الهوية الفنية لـ ${name}:</b> تعتبر هذه الطائرة من الركائز الأساسية في عالم الطيران. تم تصميمها لتتجاوز التوقعات في الأداء الجوي والقدرة على التحمل.`;
            for(let j=1; j<=40; j++) {
                text += `<br><b>تقرير التحديث رقم ${j}:</b> تم فحص أنظمة الطيران والمحركات لضمان أعلى مستويات الأمان. المواصفات تشمل رادارات متطورة، أنظمة رؤية ليلية، وقدرة على حمل أوزان ثقيلة. تاريخ الخدمة يمتد لعقود من النجاح والتميز الجوي. هذه الطائرة تخضع لصيانة دورية بمعايير عالمية في مراكز الصيانة السعودية.`;
            }
            return text;
        }

        function generateEnData(name) {
            let text = `<b>Technical Identity for ${name}:</b> This aircraft is a cornerstone in the aviation world, designed to exceed expectations in performance and endurance.`;
            for(let j=1; j<=40; j++) {
                text += `<br><b>Update Report #${j}:</b> Avionics and engines have been inspected to ensure maximum safety. Specs include advanced radars, night vision, and heavy payload capacity. Service history spans decades of success. This aircraft undergoes world-class maintenance in Saudi facilities.`;
            }
            return text;
        }
    </script>
</body>
</html>
