<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>THE VAULT - PROJECT X</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* تأثير التشويش (Glitch) */
        .glitch {
            font-size: 5rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); }
            /* ... استكمال الأنيميشن */
        }

        .terminal {
            width: 80%;
            max-width: 900px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #0f0;
            padding: 30px;
            box-shadow: 0 0 20px #0f0;
            height: 400px;
            overflow-y: auto;
        }

        .command-line {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
        }

        .made-saudi {
            position: fixed;
            bottom: 20px;
            letter-spacing: 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="glitch">PROJECT X</div>

    <div class="terminal" id="output">
        <div>> جاري تشغيل النظام...</div>
        <div>> تم الاتصال بنجاح.</div>
        <div>> أدخل أمراً للبدء (اكتب: 'طائرات', 'سعودي', 'تاريخ')...</div>
    </div>

    <div class="command-line">
        <span>></span>
        <input type="text" id="input" autofocus>
    </div>

    <div class="made-saudi">MADE IN SAUDI</div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                processCommand(val);
                this.value = '';
            }
        });

        function processCommand(cmd) {
            let res = '';
            if (cmd === 'طائرات') {
                res = "جاري استدعاء سجلات الصقور... F-15SA جاهزة، Typhoon في الخدمة، Tornado قيد المتابعة.";
            } else if (cmd === 'سعودي') {
                res = "النظام سعودي 100% - فخر الصناعة الرقمية الوطنية.";
            } else if (cmd === 'تاريخ') {
                res = "اليوم هو: " + new Date().toLocaleDateString('ar-SA');
            } else {
                res = "أمر غير معروف. حاول مجدداً.";
            }

            const div = document.createElement('div');
            div.innerHTML = `<span style="color: #fff">> ${cmd}</span><br>${res}<br><br>`;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
