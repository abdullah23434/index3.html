<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALCONS - موسوعة الصقور المحدثة</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #050505;
            --card: #121212;
            --glass: rgba(0, 255, 65, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            text-align: center;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon);
            margin-bottom: 30px;
        }

        /* حاوية المربعات */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* المربع (الشريحة) */
        .plane-square {
            background: var(--card);
            aspect-ratio: 1 / 1;
            border: 1px solid #333;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .plane-square:hover {
            border-color: var(--neon);
            transform: translateY(-10px);
            box-shadow: 0 0 20px var(--glass);
        }

        .plane-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.7; /* لزيادة وضوح الصورة */
            transition: 0.4s;
        }

        .plane-square:hover img {
            opacity: 1;
            transform: scale(1.1);
        }

        .plane-info-overlay {
            position: relative;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            width: 100%;
        }

        .plane-info-overlay h2 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--neon);
            text-shadow: 0 0 5px black;
        }

        /* واجهة اختيار النسخة والبيانات */
        #details-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .back-btn {
            background: transparent;
            border: 2px solid var(--neon);
            color: var(--neon);
            padding: 10px 20px;
            cursor: pointer;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: var(--neon);
            color: black;
        }

        .variants-grid {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .variant-btn {
            background: var(--card);
            border: 1px solid var(--neon);
            color: white;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .variant-btn:hover {
            background: var(--neon);
            color: black;
        }

        .specs-sheet {
            background: var(--card);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid #333;
            max-width: 800px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }

        .stat-label { color: var(--neon); font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="home-view">
        <h1>FALCONS - رادار الصقور 🦅</h1>
        <div class="grid-container" id="planes-grid">
            </div>
    </div>

    <div id="details-view">
        <button class="back-btn" onclick="closeDetails()">⬅️ العودة للرئيسية</button>
        <h1 id="selected-plane-title" style="text-align: right; margin-right: 20px;">اسم الطائرة</h1>
        
        <p style="margin-right: 20px;">اختر النسخة (Model) المطلوبة:</p>
        <div class="variants-grid" id="variants-list" style="margin-right: 20px;"></div>

        <div id="specs-container" class="hidden" style="margin-right: 20px;">
            <div class="specs-sheet">
                <h2 id="variant-title" style="color: var(--neon); border-bottom: 1px solid #333; padding-bottom: 10px;"></h2>
                <div class="stat-row"><span class="stat-label">السرعة القصوى:</span> <span id="s-speed"></span></div>
                <div class="stat-row"><span class="stat-label">الحمولة التسليحية / السعة:</span> <span id="s-payload"></span></div>
                <div class="stat-row"><span class="stat-label">العدد في السعودية:</span> <span id="s-saudi"></span></div>
                <div class="stat-row"><span class="stat-label">العدد العالمي التقريبي:</span> <span id="s-world"></span></div>
                <div class="stat-row"><span class="stat-label">قواعد العمليات / المدن:</span> <span id="s-cities"></span></div>
            </div>
        </div>
    </div>

    <script>
        // قاائمة البيانات الضخمة (بحر المعلومات)
        const aviationDB = {
            "F-15SA Eagle": {
                // تم وضع رابط الصورة التي اخترتها هنا
                image: "https://share.google/7Jto8aTPOewgxCm0b",
                variants: {
                    "F-15SA (القوات الجوية السعودية)": {
                        speed: "3,017 كم/س (2.5+ Mach)",
                        payload: "12 صاروخ (جو-جو) + قنابل موجهة بدقة",
                        saudi: "84 طائرة (النسخة الأحدث)",
                        world: "1200+ (كل الفئات)",
                        cities: "خميس مشيط، الظهران، الرياض"
                    },
                    "F-15 Strike Eagle (أخرى)": {
                        speed: "2,650 كم/س",
                        payload: "8 صواريخ جو-جو / حمولة هجومية ضخمة",
                        saudi: "60+ طائرة F-15C/D",
                        world: "500+ طائرة",
                        cities: "تبوك، جدة"
                    }
                }
            },
            "Eurofighter Typhoon": {
                image: "https://images.unsplash.com/photo-1516939884455-1445c8652f83?q=80&w=600",
                variants: {
                    "Tranche 3 (التايفون السعودية)": {
                        speed: "2,495 كم/س (2.0 Mach)",
                        payload: "صواريخ ميتيور، ستروم شادو، قنابل بايفوي",
                        saudi: "72 طائرة",
                        world: "600+",
                        cities: "الطائف، الظهران"
                    }
                }
            },
            "F-35 Lightning II": {
                image: "https://images.unsplash.com/photo-1581091215367-176a91d17e62?q=80&w=600",
                variants: {
                    "F-35A (الجيل الخامس)": {
                        speed: "1,930 كم/س (1.6 Mach)",
                        payload: "تسليح داخلي (للخفاء) + تسليح خارجي",
                        saudi: "غير متوفرة حالياً",
                        world: "1,000+",
                        cities: "قواعد أمريكية ودولية"
                    }
                }
            },
            "Su-57 Felon": {
                image: "https://images.unsplash.com/photo-1627632661571-08f37648f07b?q=80&w=600",
                variants: {
                    "Su-57 (النسخة الروسية)": {
                        speed: "2,135 كم/س (2.0 Mach)",
                        payload: "صواريخ جو-جو بعيدة المدى، وقنابل موجهة",
                        saudi: "غير متوفرة",
                        world: "20-30 طائرة حالياً",
                        cities: "قواعد روسية"
                    }
                }
            },
            "Rafael (الفرنسية)": {
                image: "https://images.unsplash.com/photo-1611090159419-b001ae6b8f3a?q=80&w=600",
                variants: {
                    "Rafale F4": {
                        speed: "2,222 كم/س",
                        payload: "صواريخ ميكا وميتيور، صاروخ كروز",
                        saudi: "مفاوضات جارية",
                        world: "250+",
                        cities: "قواعد فرنسية، مصر، قطر، الإمارات"
                    }
                }
            },
            "Boeing 747": {
                image: "https://images.unsplash.com/photo-1544016768-982d1554f0b9?q=80&w=600",
                variants: {
                    "747-8 Intercontinental": {
                        speed: "988 كم/س",
                        payload: "السعة: 467-525 راكب",
                        saudi: "طائرات كبار الشخصيات / الشحن",
                        world: "1,500+ (كل الفئات)",
                        cities: "جدة، الرياض"
                    }
                }
            },
            "Airbus A380": {
                image: "https://images.unsplash.com/photo-1594396001211-1372a81f3d61?q=80&w=600",
                variants: {
                    "A380-800": {
                        speed: "900 كم/س",
                        payload: "السعة: 525 - 853 راكب (العملاقة)",
                        saudi: "موجودة في المطارات الدولية",
                        world: "251 طائرة (توقف الإنتاج)",
                        cities: "جدة، الرياض"
                    }
                }
            }
        };

        // بناء الشبكة عند فتح الموقع
        const grid = document.getElementById('planes-grid');
        for (let plane in aviationDB) {
            const square = document.createElement('div');
            square.className = 'plane-square';
            square.onclick = () => openDetails(plane);
            square.innerHTML = `
                <img src="${aviationDB[plane].image}" alt="${plane}">
                <div class="plane-info-overlay">
                    <h2>${plane}</h2>
                </div>
            `;
            grid.appendChild(square);
        }

        function openDetails(planeName) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            document.getElementById('selected-plane-title').innerText = planeName;
            
            const variantList = document.getElementById('variants-list');
            variantList.innerHTML = ''; // تنظيف القائمة
            document.getElementById('specs-container').classList.add('hidden');

            const variants = aviationDB[planeName].variants;
            for (let vName in variants) {
                const btn = document.createElement('button');
                btn.className = 'variant-btn';
                btn.innerText = vName;
                btn.onclick = () => showSpecs(planeName, vName);
                variantList.appendChild(btn);
            }
        }

        function showSpecs(planeName, vName) {
            const data = aviationDB[planeName].variants[vName];
            document.getElementById('specs-container').classList.remove('hidden');
            document.getElementById('variant-title').innerText = vName;
            document.getElementById('s-speed').innerText = data.speed;
            document.getElementById('s-payload').innerText = data.payload;
            document.getElementById('s-saudi').innerText = data.saudi;
            document.getElementById('s-world').innerText = data.world;
            document.getElementById('s-cities').innerText = data.cities;
        }

        function closeDetails() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
        }
    </script>
</body>
</html>
