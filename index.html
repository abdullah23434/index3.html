<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODERN PROJECT - 2026</title>
    <style>
        /* الخطوط والألوان العالمية */
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex_Sans_Arabic:wght@300;500;700&display=swap');

        :root {
            --primary: #ffffff;
            --accent: #007AFF; /* أزرق آبل */
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الخلفية المتحركة */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 30%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #888;
            font-size: 1.2rem;
            margin-bottom: 50px;
        }

        /* المربعات الزجاجية الحقيقية */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: right;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-10px) scale(1.02);
        }

        .glass-card h2 {
            font-size: 1.8rem;
            color: var(--accent);
            margin: 0 0 15px 0;
        }

        .glass-card p {
            color: #aaa;
            line-height: 1.6;
            margin: 0;
        }

        .saudi-footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* لمسة التفاعل */
        .glass-card::after {
            content: "←";
            display: block;
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--accent);
            opacity: 0;
            transition: 0.3s;
        }

        .glass-card:hover::after {
            opacity: 1;
            transform: translateX(-10px);
        }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1>المستقبل</h1>
        <p class="subtitle">تجربة رقمية جديدة صممت بكل فخر</p>

        <div class="main-grid">
            <div class="glass-card">
                <h2>الابتكار الرقمي</h2>
                <p>هنا تضع وصف مشروعك الجديد، كلمات قوية ومختصرة تعبر عن ذوقك الرفيع في البرمجة.</p>
            </div>

            <div class="glass-card">
                <h2>الرؤية الوطنية</h2>
                <p>مشروع سعودي طموح يهدف لتقديم حلول برمجية بأعلى معايير الجمال والبساطة.</p>
            </div>
        </div>

        <div class="saudi-footer">MADE IN SAUDI 🇸🇦</div>
    </div>

</body>
</html>
