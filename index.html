<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcons - موسوعة الصقور للطيران</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .search-container {
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--neon-green);
            color: white;
            border-radius: 5px;
            outline: none;
        }

        .plane-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
            border-left: 5px solid var(--neon-green);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: #262626;
            padding: 10px;
            border-radius: 8px;
        }

        .stat-label {
            display: block;
            color: var(--neon-green);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
        }

        .badge {
            background: #d4a017;
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            float: left;
        }
    </style>
</head>
<body>

    <h1>FALCONS - رادار الصقور</h1>
    <p>الموسوعة الشاملة للطائرات الحربية والمدنية</p>

    <div class="plane-card" id="display-area">
        <span class="badge" id="plane-type">حربية</span>
        <h2 id="plane-name" style="margin-top: 0;">F-15SA Eagle</h2>
        <hr style="border: 0.5px solid #333;">
        
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-label">السرعة القصوى</span>
                <span class="stat-value" id="speed">3,017 كم/س (2.5 Mach)</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">الحمولة التسليحية</span>
                <span class="stat-value" id="payload">12 صاروخ جو-جو</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">العدد في السعودية</span>
                <span class="stat-value" id="saudi-count">84 طائرة</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">الانتشار العالمي</span>
                <span class="stat-value" id="world-count">1,200+ طائرة</span>
            </div>
        </div>
        
        <p style="margin-top: 20px; color: #aaa;">
            <strong>المدن المتواجدة بها:</strong> <span id="cities">الظهران، الرياض، خميس مشيط</span>
        </p>
    </div>

    <div class="controls">
        <button onclick="prevPlane()">⬅️ الطائرة السابقة</button>
        <button onclick="nextPlane()">الطائرة التالية ➡️</button>
    </div>

    <script>
        // هنا "بحر الأسئلة والمعلومات" - تقدر تزيد آلاف الطائرات في هذه المصفوفة
        const planesData = [
            {
                name: "F-15SA (النسخة السعودية)",
                type: "حربية",
                speed: "3,017 كم/س (2.5 Mach)",
                payload: "12 صاروخ جو-جو",
                saudi: "84 طائرة",
                world: "1,200+",
                cities: "الظهران، الرياض، خميس مشيط"
            },
            {
                name: "بوينج 747-8 (جامبو)",
                type: "مدنية",
                speed: "988 كم/س",
                payload: "410 - 467 راكب",
                saudi: "متوفرة في الخطوط السعودية",
                world: "1,500+ (كل الفئات)",
                cities: "جدة، الرياض"
            },
            {
                name: "Eurofighter Typhoon",
                type: "حربية",
                speed: "2,495 كم/س (2.0 Mach)",
                payload: "صواريخ ميتيور وستروم شادو",
                saudi: "72 طائرة",
                world: "600+",
                cities: "الطائف، الظهران"
            },
            {
                name: "إيرباص A380",
                type: "مدنية",
                speed: "900 كم/س",
                payload: "525 - 853 راكب",
                saudi: "موجودة في المطارات الدولية",
                world: "251 طائرة",
                cities: "جدة، الرياض"
            }
        ];

        let currentIndex = 0;

        function updateDisplay() {
            const plane = planesData[currentIndex];
            document.getElementById('plane-name').innerText = plane.name;
            document.getElementById('plane-type').innerText = plane.type;
            document.getElementById('speed').innerText = plane.speed;
            document.getElementById('payload').innerText = plane.payload;
            document.getElementById('saudi-count').innerText = plane.saudi;
            document.getElementById('world-count').innerText = plane.world;
            document.getElementById('cities').innerText = plane.cities;
            
            // تغيير لون التاق حسب النوع
            const badge = document.getElementById('plane-type');
            badge.style.background = plane.type === "حربية" ? "#d4a017" : "#007bff";
        }

        function nextPlane() {
            currentIndex = (currentIndex + 1) % planesData.length;
            updateDisplay();
        }

        function prevPlane() {
            currentIndex = (currentIndex - 1 + planesData.length) % planesData.length;
            updateDisplay();
        }
    </script>
</body>
</html>
